# 本番(競技)サーバ /etc/nginx/sites-available/isucon.conf の複製記録。
# Docker版は webapp/etc/nginx/conf.d/default.conf を参照。
# 第15回(Phase B step a): 静的アセット(css/js/img/favicon)を nginx 直配信。
#   - try_files $uri @app で「ファイルがあれば nginx、無ければアプリ」へフォールバック（安全）。
#   - expires/Cache-Control(step b) は効果なく不安定化のため不採用（nginx は ETag/Last-Modified を自動付与し条件付き304は既に機能）。
#   - upstream keepalive + proxy_http_version 1.1(step c) は GET /posts/{id} の散発404を誘発（第12回失敗の真因）→不採用。
server {
  listen 80;
  access_log /var/log/nginx/access.log ltsv;

  client_max_body_size 10m;
  root /home/isucon/private_isu/webapp/public/;

  # 画像はファイルがあれば nginx が直接配信し、無ければアプリへ（初回はアプリが書き出す）
  location /image/ {
    try_files $uri @app;
  }

  # 静的アセットを nginx 直配信（無ければ @app へフォールバック）
  location ~ ^/(css|js|img)/ {
    try_files $uri @app;
  }
  location = /favicon.ico {
    try_files $uri @app;
  }

  location @app {
    proxy_set_header Host $host;
    proxy_pass http://localhost:8080;
  }

  location / {
    proxy_set_header Host $host;
    proxy_pass http://localhost:8080;
  }
}
